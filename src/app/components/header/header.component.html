<header class="fixed top-0 left-0 w-full flex items-center justify-between p-4 border-b-2 border-gray-200 bg-white shadow-md lg:px-10 z-50">
  <img clas="h-screen" src="assets/logo.png" alt="logo" class="h-12">

  <!-- Botão do Menu Mobile -->
  <button (click)="toggleMenu()" class="flex text-white cursor-pointer md:hidden focus:outline-none" aria-label="Menu">
    <img *ngIf="isMenuOpen" src="assets/close.png" alt="Fechar menu" class="h-10 cursor-pointer">
    <img *ngIf="!isMenuOpen" src="assets/open.png" alt="Abrir menu" class="h-10 cursor-pointer">
  </button>

  <!-- Mobile Menu -->
  <section 
    *ngIf="isMenuOpen" 
    class="absolute flex flex-col justify-center items-center gap-3 p-5 w-full bg-white left-0 top-[80px] transform transition-all duration-300 ease-in-out z-30 shadow-lg md:hidden"
    role="menu"
  >
    <h2 class="text-gray-800 hover:text-[#2f9335] cursor-pointer transition duration-300" role="menuitem">Sobre</h2>
    <h2 class="text-gray-800 hover:text-[#2f9335] cursor-pointer transition duration-300" role="menuitem">Setores</h2>
    <h2 class="text-gray-800 hover:text-[#2f9335] cursor-pointer transition duration-300" role="menuitem">Galeria</h2>
    <h2 class="text-gray-800 hover:text-[#2f9335] cursor-pointer transition duration-300" role="menuitem">Contatos</h2>
  </section>

  <!-- Desktop Menu -->
  <section class="hidden md:flex flex-row gap-6 lg:gap-8 items-center">
    <h2 class="text-gray-800 hover:text-[#2f9335] cursor-pointer transition duration-300">Sobre</h2>
    <h2 class="text-gray-800 hover:text-[#2f9335] cursor-pointer transition duration-300">Setores</h2>
    <h2 class="text-gray-800 hover:text-[#2f9335] cursor-pointer transition duration-300">Galeria</h2>
    <h2 class="text-gray-800 hover:text-[#2f9335] cursor-pointer transition duration-300">Contatos</h2>
  </section>
</header>
