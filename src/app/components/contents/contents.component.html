<section class="p-6 lg:p-12 bg-[#f4f4f4]">
  <h1 class="text-center text-3xl lg:text-4xl font-extrabold text-gray-800 mb-12">Áreas de Atuação</h1>
  
  <section class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-2 lg:grid-cols-4 gap-8">
    <div class="flex flex-col gap-4 p-6 bg-white rounded-lg shadow-lg hover:shadow-xl transform hover:scale-105 transition-transform duration-300" *ngFor="let content of contents">
      <h2 class="text-[#2f9335] text-2xl font-semibold">{{ content.title }}</h2>
      <p class="text-gray-700 text-base"> {{ content.description }}</p>
      <a href="#" class="text-[rgb(47,147,53)] border-b-2 border-[#2f9335] hover:text-[#1c6b2e] transition-colors duration-300">{{ content.linkText }}</a>
    </div>
  </section>
</section>
