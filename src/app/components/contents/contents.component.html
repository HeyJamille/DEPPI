<article class="p-5 lg:p-10"> 
  <h1 class="text-center text-4xl mb-10">Contéudos</h1>
  
  <section class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-5">
    <div class="flex flex-col gap-5 p-5 bg-gray-100 rounded-lg transform hover:scale-105 transition-transform duration-300 " *ngFor="let content of contents">
      <h2 class="text-[#2f9335]">{{ content.title }}</h2>
      <p class="text-justify">{{ content.description }}</p>
      <a href="#" class="text-[#2f9335] border-b-2 w-[80px] border-[#2f9335]">{{ content.linkText }}</a>
    </div>
  </section>
</article>
